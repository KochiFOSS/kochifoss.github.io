<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="{{ "tailwind.js" | relURL }}"></script>
    <link rel="stylesheet" href="{{ "styles/style.css" | relURL }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu:400,500,700&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <title>Kochi FOSS</title>
  </head>

  <body class="bg-gradient-to-br from-sky-200 via-white to-sky-200 bg-cover bg-no-repeat bg-fixed">
    <div class="pt-10 pb-20 px-4 flex-col space-y-12 justify-center">
      {{ partial "navbar" . }}
      {{ block "main" . }}{{ end }}
      {{ block "noticeboard" . }}{{end}}
      {{ partial "footer" . }}
    </div>
  </body>
</html>
